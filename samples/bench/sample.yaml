sample:
  description: Philosphers, in Rust
  name: philosophers rust
common:
  harness: console
  harness_config:
    type: one_line
    regex:
      # Match message printed at the end.
      - "Done with all tests"
  tags: rust
  filter: CONFIG_RUST_SUPPORTED
  platform_allow:
    - qemu_cortex_m0
    - qemu_cortex_m3
    - qemu_riscv32
    - qemu_riscv64
    - nrf52840dk/nrf52840
    - nrf54l15dk/nrf54l15/cpuapp
tests:
  sample.rust/bench.plain:
    tags: benchmark
    min_ram: 256
