# Description of how to augment the devicetree for Rust.
#
# Each entry describes an augmentation that will be added to matching nodes in the device tree.
# The full syntax is described (indirectly) in `zephyr-build/src/devicetree/config.rs`.

# Gpio controllers match for every node that has a `gpio-controller` property.  This is one of the
# few instances were we can actually just match on a property.
- name: gpio-controller
  rules:
    - !HasProp gpio-controller
  actions:
    - !Instance
      raw: !Myself
      device: crate::device::gpio::Gpio
      static_type: crate::device::gpio::GpioStatic

# The gpio-leds node will have #children nodes describing each led.  We'll match on the parent
# having this compatible property.  The nodes themselves are built out of the properties associated
# with each gpio.
- name: gpio-leds
  rules:
    - !Compatible
      names: [gpio-leds]
      level: 1
  actions:
    - !Instance
      raw: !Phandle gpios
      device: crate::device::gpio::GpioPin

# The pwm-leds node itself is a Zephyr LED controller device.
- name: pwm-led-controller
  rules:
    - !Compatible
      names: [pwm-leds]
      level: 0
  actions:
    - !Instance
      raw: !Myself
      device: crate::device::led::LedController

# The pwm-leds device is an LED controller. Each child node becomes a logical LED addressed through
# the parent controller and the child's index.
- name: pwm-leds
  rules:
    - !Compatible
      names: [pwm-leds]
      level: 1
  actions:
    - !Instance
      raw: !Parent
        level: 1
        args:
          - !ChildIdx
      device: crate::device::led::Led

# WS2812 PIO driver: the strip device handle lives on the *child* of the PIO node (level 1).
# The parent carries compatible = "worldsemi,ws2812-rpi_pico-pio" and manages PIO setup;
# each child node is a distinct strip and is what DEVICE_DT_GET / aliases point to.
- name: ws2812-rpi-pico-pio-led-strip
  rules:
    - !Compatible
      names:
        - "worldsemi,ws2812-rpi_pico-pio"
      level: 1
  actions:
    - !Instance
      raw: !Myself
      device: crate::device::led_strip::LedStrip

# WS2812 SPI/GPIO drivers: the strip device handle lives directly on the compatible node (level 0).
- name: ws2812-led-strip
  rules:
    - !Compatible
      names:
        - "worldsemi,ws2812-spi"
        - "worldsemi,ws2812-gpio"
      level: 0
  actions:
    - !Instance
      raw: !Myself
      device: crate::device::led_strip::LedStrip

# Flash controllers don't have any particular property to identify them, so we need a list of
# compatible values that should match.
- name: flash-controller
  rules:
    - !Compatible
      names:
        - "nordic,nrf52-flash-controller"
        - "nordic,nrf51-flash-controller"
        - "raspberrypi,pico-flash-controller"
        - "zephyr,sim-flash"
        - "st,stm32-flash-controller"
        - "nxp,msf1"
        - "espressif,esp32-flash-controller"
      level: 0
  actions:
    - !Instance
      raw: !Myself
      device: crate::device::flash::FlashController

# Flash partitions exist as children of a node compatible with "soc-nv-flash" that itself is a child
# of the controller itself.
# TODO: Get the write and erase property from the DT if present.
- name: flash-partition
  rules:
    - !Compatible
      names:
        - "fixed-partitions"
      level: 1
    - !Compatible
      names:
        - "soc-nv-flash"
      level: 2
  actions:
    - !Instance
      raw: !Parent
        level: 3
        args:
          - !Reg
      device: "crate::device::flash::FlashPartition"

# To allow more general use, output all of the properties for every node as data.
- name: raw_properties
  rules: []
  actions:
    - !RawProperties

# Generate a pseudo node that matches all of the labels across the tree with their nodes.
- name: labels
  rules:
    - !Root
  actions:
    - !Labels
